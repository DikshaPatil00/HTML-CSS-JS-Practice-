<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="progress.css">
</head>
<body>
    <fieldset>
        <h2>Test Form</h2>
        <div class="container">
        <form action=""  method="">
     
        <h5>
           <label for="username">username :: &nbsp;</label>
           <input type="text" placeholder="enter the username"
           name="username" value="Admin" id="username">
        </h5>
        <h5>
            <label for="phone number">phone number :: &nbsp;</label>
            <input type="tel" placeholder="enter the phone number"
             id="phonenumber">
            </h5>

        <h5>
            <label for="address">address:: &nbsp;</label>
            <input type="address" placeholder="enter the address" id="address">
        </h5>
        <h5>
            <label for="email">email :: &nbsp;</label>
            <input type="text" placeholder="enter the email" id="email">
        </h5>
        <h5>
            <label for="">gender :: &nbsp;</label>
            <input type="radio" name="gender" value="male">male
            <input type="radio" name="gender" value="female">female
        </h5>
        <div class="table">
        <h5>
            <label for="">skill set</label></h5>
            <input type="checkbox" name="java">java 
            <input type="checkbox" name="python">python 
            <input type="checkbox" name="adv java">adv java 
            <input type="checkbox" name="database">database 
        </div>
        <h5>
            <input type="range" id="myrange" min="50" max="500">
        </h5>
        <h5>
            <label for="">country</label>
            <select name="country" id="country"> 
                <option value="india">india</option>
                <option value="usa">usa</option>
                <option value="egypt">egypt</option>
            </select>
        </h5>
        <hr>
         <button class="sbt">submit</button>
    
    </form>
    </div>
    </fieldset>

    
</body>
</html>
