<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment form</title>
</head>
<body>
    
    <fieldset>
        <legend> <h2>payment form</h2></legend>
        <form action=""  method="">
            <h3>personal information</h3>
         <label for="username">username :: &nbsp;</label>
         <input type="text" placeholder="Enter the username.." 
         name="username" id="username" required> <br><br>

         <label for="password">password :: &nbsp;</label>
         <input type="password" placeholder="enter the password"
         name="password" id="password" required> <br><br>

         <label for="Email">Email :: &nbsp;</label>
         <input type="email" placeholder="enter the email"
         name="email" id="email"> <br><br>

         <label for="phonenumber">phonenumber :: &nbsp;</label>
         <input type="tel" placeholder="enter the phonenumber"
         name="phonenumber" id="phonenumber"> <br><br>
         

         <label for="gender">gender:: &nbsp;</label>
         <input type="radio" name="gender" value="male">male
         <input type="radio" name="gender" value="female">female
         <input type="radio" name="gender" value="other">other<br><br>

             <hr>
            <h3>payment information</h3>
         <label for="ID">ID</label>
         <input type="number" value="112" readonly><br><br>

         <label for="">payment method</label>
         <input type="checkbox" value="card">card
         <input type="checkbox" value="phonepay">phonepay
         <input type="checkbox" value="paytm">paytm <br><br>

         <select name="country" id="country">
            <option value="india">india</option>
            <option value="america">america</option>
            <option value="UK">Uk</option>
            <option value="dubai">dubai</option>
            <option value="usa">usa</option>
         </select> <br><br>

          <input id="myrange" min="10" max="100" step="1" type="range">
          <br><br>

          <input type="date"> <br><br>

          <input type="file" name="image" accept="pdf/*">
          <br><br>


        <input type="submit" value="submit">



        </form>
    </fieldset>
    
</body>
</html>
