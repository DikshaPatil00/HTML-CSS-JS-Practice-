<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <fieldset>
      <legend>sign up</legend> 
      <form action=""  method="">

        <label for="username">username:: &nbsp;</label>
        <input type=" text" placeholder="enter the username..
        " name="username" value="Admin" id="username"> <br> <br>

        <label for="password">password:: &nbsp;</label>
        <input type="password" placeholder="enter the password..
        " name="password" id="password"> <br> <br>

        <label for="Email">Email:: &nbsp;</label>
        <input type=" Email" placeholder="enter the Email..
        " name="Email" id="Email"> <span>*required</span> <br> <br> 

        <label for="phonenumber">phonenumber:: &nbsp;</label>
        <input type="tel" placeholder="enter the phonenumber..
        " name="phonenumber" id="phonenumber" required > <br> <br>

        <label for="">gender::</label>
        <input type="radio" name="gender" value="male">male
        <input type="radio" name="gender" value="female">female <br><br>

        <label for="">ID</label>
        <input type="number" value="100" readonly>
        <br><br>

        <label for="">skill set</label>
        <input type="checkbox" checked name value="java"> java
        <input type="checkbox" value="corejava"> corejava
        <input type="checkbox" value="python"> python

        <br><br>

        <select name="country" id="country">
            <option value="">select country</option>
            <option value="india">india</option>
            <option value="uk">uk</option>
            <option value="usa">usa</option>
            <option value="japan">japan</option>
        </select>
         <br><br>

        <input id="myrange" min="10" max="500" step="1" type="range">

        <br><br>

        <input type="date"> <br><br>

        <input type="file" name="image" accept=".pdf/*">


        <br> <br>
        <input type="submit" value="submit">



      </form> 
    </fieldset>

</body>
</html>
